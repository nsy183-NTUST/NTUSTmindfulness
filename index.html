<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正念呼吸計時器 - NTUST</title>
    <style>
        :root {
            --ntust-blue: #005BAB;
            --background-color: #1a1a1a;
            --text-color: #f2f2f2;
            --circle-border: rgba(255, 255, 255, 0.2);
            --panel-bg: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .school-header {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            color: white;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 1px;
            opacity: 0.9;
            pointer-events: none;
            text-align: right;
            z-index: 10;
            line-height: 1.5;
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding-bottom: 220px; 
        }

        .breathing-circle-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-reference {
            width: 250px;
            height: 250px;
            border: 2px solid var(--circle-border);
            border-radius: 50%;
            position: absolute;
        }

        .breathing-circle {
            width: 250px;
            height: 250px;
            background-color: var(--ntust-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(0.6); 
            box-shadow: 0 0 50px rgba(0, 91, 171, 0.4);
            transition: transform 1s linear; 
        }

        #guide-text {
            color: white;
            font-size: 2.2rem;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            user-select: none;
        }

        .control-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--panel-bg);
            padding: 1.5rem 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 100;
        }

        .sliders-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem 2rem;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .slider-label-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .slider-label-row .time-val {
            color: #4da3ff; 
            font-weight: bold;
        }

        input[type=range] {
            width: 100%;
            height: 8px;
            background: #444;
            border-radius: 4px;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--ntust-blue);
            border: 2px solid white;
            cursor: pointer;
        }

        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .stats-display {
            display: flex;
            gap: 2rem;
        }

        .stat-item .label {
            opacity: 0.7;
            margin-right: 0.5rem;
        }

        .stat-item .value {
            font-weight: bold;
            font-size: 1.2rem;
            color: #fff;
        }

        #start-stop-btn {
            background-color: var(--ntust-blue);
            color: white;
            border: none;
            padding: 0.8rem 3rem;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #start-stop-btn.running {
            background-color: #d9534f;
        }

        @media (max-height: 700px) {
            .circle-reference, .breathing-circle { width: 180px; height: 180px; }
            .main-container { padding-bottom: 180px; }
            #guide-text { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="school-header">
        NTUST / 正念減壓與情緒管理 / 葉北辰 / gemini
    </div>

    <div class="main-container">
        <div class="breathing-circle-container">
            <div class="circle-reference"></div>
            <div class="breathing-circle" id="dynamic-circle">
                <div id="guide-text">準備...</div>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <div class="sliders-container">
            <div class="slider-group">
                <div class="slider-label-row"><span>吸氣 (Inhale)</span><span class="time-val"><span id="val-inhale">4</span>s</span></div>
                <input type="range" id="slide-inhale" min="1" max="10" value="4">
            </div>
            <div class="slider-group">
                <div class="slider-label-row"><span>停頓 (Hold)</span><span class="time-val"><span id="val-hold1">7</span>s</span></div>
                <input type="range" id="slide-hold1" min="0" max="10" value="7">
            </div>
            <div class="slider-group">
                <div class="slider-label-row"><span>吐氣 (Exhale)</span><span class="time-val"><span id="val-exhale">8</span>s</span></div>
                <input type="range" id="slide-exhale" min="1" max="10" value="8">
            </div>
            <div class="slider-group">
                <div class="slider-label-row"><span>停頓 (Hold)</span><span class="time-val"><span id="val-hold2">0</span>s</span></div>
                <input type="range" id="slide-hold2" min="0" max="10" value="0">
            </div>
        </div>

        <div class="bottom-row">
            <div class="stats-display">
                <div class="stat-item"><span class="label">完成循環</span><span class="value" id="cycle-count">0</span></div>
                <div class="stat-item"><span class="label">總時長</span><span class="value" id="total-time">00:00</span></div>
            </div>
            <button id="start-stop-btn">開始練習</button>
        </div>
    </div>

    <script>
        const circle = document.getElementById('dynamic-circle');
        const guideText = document.getElementById('guide-text');
        const startStopBtn = document.getElementById('start-stop-btn');
        const cycleCountDisplay = document.getElementById('cycle-count');
        const totalTimeDisplay = document.getElementById('total-time');

        const sliders = {
            inhale: { input: document.getElementById('slide-inhale'), val: document.getElementById('val-inhale') },
            hold1: { input: document.getElementById('slide-hold1'), val: document.getElementById('val-hold1') },
            exhale: { input: document.getElementById('slide-exhale'), val: document.getElementById('val-exhale') },
            hold2: { input: document.getElementById('slide-hold2'), val: document.getElementById('val-hold2') }
        };

        let isRunning = false;
        let animationTimeout = null;
        let totalTimeInterval = null;
        let cycleCount = 0;
        let startTime = 0;
        let wakeLock = null;

        const SCALE_MIN = 0.6;
        const SCALE_MAX = 1.0;

        Object.keys(sliders).forEach(key => {
            sliders[key].input.addEventListener('input', (e) => {
                sliders[key].val.textContent = e.target.value;
            });
        });

        async function runBreathingCycle() {
            if (!isRunning) return;

            // 1. 吸氣
            let dInhale = parseInt(sliders.inhale.input.value) * 1000;
            setAnimationState("吸氣...", SCALE_MAX, dInhale);
            await sleep(dInhale);
            if (!isRunning) return;

            // 2. 吸氣後停頓 (若為 0 會直接跳過)
            let dHold1 = parseInt(sliders.hold1.input.value) * 1000;
            if (dHold1 > 0) {
                setAnimationState("停頓...", SCALE_MAX, 0);
                await sleep(dHold1);
            }
            if (!isRunning) return;

            // 3. 吐氣
            let dExhale = parseInt(sliders.exhale.input.value) * 1000;
            setAnimationState("吐氣...", SCALE_MIN, dExhale);
            await sleep(dExhale);
            if (!isRunning) return;

            // 4. 吐氣後停頓 (若為 0 會直接跳過)
            let dHold2 = parseInt(sliders.hold2.input.value) * 1000;
            if (dHold2 > 0) {
                setAnimationState("停頓...", SCALE_MIN, 0);
                await sleep(dHold2);
            }
            if (!isRunning) return;

            cycleCount++;
            cycleCountDisplay.textContent = cycleCount;
            runBreathingCycle();
        }

        function setAnimationState(text, scale, durationMs) {
            guideText.textContent = text;
            circle.style.transition = durationMs > 0 ? `transform ${durationMs}ms linear` : 'none';
            circle.style.transform = `scale(${scale})`;
        }

        function sleep(ms) {
            return new Promise(resolve => { animationTimeout = setTimeout(resolve, ms); });
        }

        function startPractice() {
            isRunning = true;
            startStopBtn.textContent = "停止練習";
            startStopBtn.classList.add('running');
            cycleCount = 0;
            cycleCountDisplay.textContent = '0';
            startTime = Date.now();
            updateTotalTimeDisplay();
            requestWakeLock();
            totalTimeInterval = setInterval(updateTotalTimeDisplay, 1000);
            runBreathingCycle();
        }

        function stopPractice() {
            isRunning = false;
            startStopBtn.textContent = "開始練習";
            startStopBtn.classList.remove('running');
            guideText.textContent = "練習結束";
            releaseWakeLock();
            if (totalTimeInterval) clearInterval(totalTimeInterval);
            if (animationTimeout) clearTimeout(animationTimeout);
            circle.style.transition = 'transform 0.8s ease-out';
            circle.style.transform = `scale(${SCALE_MIN})`;
        }

        function updateTotalTimeDisplay() {
            const elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(elapsedSeconds / 60).toString().padStart(2, '0');
            const s = (elapsedSeconds % 60).toString().padStart(2, '0');
            totalTimeDisplay.textContent = `${m}:${s}`;
        }

        startStopBtn.addEventListener('click', () => {
            if (isRunning) stopPractice(); else startPractice();
        });

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) { wakeLock.release().then(() => { wakeLock = null; }); }
        }
    </script>
</body>
</html>
